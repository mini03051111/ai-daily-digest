<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily Digest — 每日 AI 新聞摘要</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF3E7;
    --paper:#FFFDF8;
    --apricot:#F3A263;
    --apricot-soft:#FBE3C8;
    --apricot-deep:#D97F45;
    --sage:#8FA998;
    --sage-soft:#E4ECE3;
    --ink:#4A4036;
    --muted:#A69A87;
    --line:#EADFC9;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    min-height:100vh;
    padding:48px 16px 80px;
  }
  .num{font-family:'Fredoka','Noto Sans TC',sans-serif;}
  .wrap{max-width:680px; margin:0 auto;}

  header{text-align:center; margin-bottom:32px;}
  .eyebrow{
    display:inline-block;
    font-family:'Fredoka',sans-serif;
    font-size:13px;
    letter-spacing:0.08em;
    color:var(--apricot-deep);
    background:var(--apricot-soft);
    padding:6px 16px;
    border-radius:999px;
    margin-bottom:16px;
  }
  h1{
    font-size:28px;
    font-weight:900;
    margin:0 0 10px;
    line-height:1.4;
  }
  header p.sub{
    color:var(--muted);
    font-size:14px;
    margin:0;
  }

  .day{
    position:relative;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px 24px 20px;
    margin-bottom:20px;
    box-shadow:0 10px 24px -14px rgba(74,64,54,0.18);
  }
  .day-badge{
    display:inline-block;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:13px;
    color:#fff;
    background:var(--apricot);
    padding:5px 14px;
    border-radius:999px;
    margin-bottom:16px;
    box-shadow:0 4px 10px -2px rgba(217,127,69,0.5);
  }
  .article{
    border-top:1px dashed var(--line);
    padding-top:14px;
    margin-top:14px;
  }
  .article:first-of-type{
    border-top:none;
    padding-top:0;
    margin-top:0;
  }
  .label{
    font-size:12px;
    color:var(--sage);
    font-weight:700;
    letter-spacing:0.04em;
    margin-right:4px;
  }
  .article-title{
    font-size:16px;
    font-weight:700;
    margin:0 0 8px;
    line-height:1.5;
  }
  .article-title a{
    color:var(--apricot-deep);
    text-decoration:none;
  }
  .article-title a:hover{ text-decoration:underline; }
  .summary{
    font-size:14px;
    margin:0 0 8px;
    line-height:1.6;
  }
  .reason{
    font-size:13px;
    background:var(--sage-soft);
    color:var(--ink);
    border-radius:12px;
    padding:8px 12px;
    margin:0;
  }
  #empty{
    text-align:center;
    color:var(--muted);
    margin-top:60px;
    font-size:14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="eyebrow">🤖 DAILY AI DIGEST</span>
      <h1>每日 AI 新聞摘要</h1>
      <p class="sub">每天整理 AI 公司的最新技術與發布消息</p>
    </header>
    <div id="content"></div>
    <div id="empty" style="display:none">目前還沒有摘要記錄,明天見 🌿</div>
  </div>

  <script>
    fetch('data.json')
      .then(r => r.json())
      .then(days => {
        const content = document.getElementById('content');
        if (!days.length) {
          document.getElementById('empty').style.display = 'block';
          return;
        }
        for (const day of days) {
          const dayEl = document.createElement('div');
          dayEl.className = 'day';
          const badge = document.createElement('span');
          badge.className = 'day-badge num';
          badge.textContent = day.date;
          dayEl.appendChild(badge);
          for (const a of day.articles) {
            const artEl = document.createElement('div');
            artEl.className = 'article';
            artEl.innerHTML = `
              <p class="article-title"><span class="label">標題：</span><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></p>
              <p class="summary"><span class="label">摘要：</span>${a.summary}</p>
              <p class="reason">💡 ${a.reason}</p>
            `;
            dayEl.appendChild(artEl);
          }
          content.appendChild(dayEl);
        }
      })
      .catch(() => {
        document.getElementById('empty').style.display = 'block';
      });
  </script>
</body>
</html>
